version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: herb-db
    environment:
      POSTGRES_USER: herbuser
      POSTGRES_PASSWORD: herbpassword
      POSTGRES_DB: herbdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U herbuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: herb-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://herbuser:herbpassword@postgres:5432/herbdb
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: herb-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data: