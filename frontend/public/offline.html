<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Herb Encyclopedia</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
        }
        h1 {
            color: #166534;
            margin-bottom: 10px;
        }
        p {
            color: #15803d;
            margin-bottom: 20px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        button {
            background: #16a34a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #15803d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🌿</div>
        <h1>You're Offline</h1>
        <p>Don't worry! You can still access previously viewed herbs. Check your connection and try again.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
